name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # The full suite takes ~4 min (linux) / ~6 min (windows); a hang must fail
    # the job in minutes, not sit on the 6-hour default.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (advisory — existing debt, do not block)
        run: ruff check quam_state_manager/ tests/
        continue-on-error: true

      - name: Test
        # faulthandler_timeout dumps every thread's stack when a single test
        # exceeds 5 min — a CI-side hang then shows WHERE it hangs in the log
        # instead of an opaque cancelled job.
        run: python -m pytest tests/ -q --tb=short -o faulthandler_timeout=300
